---
# vspc_server_install tasks file for veeamhub.veeam_vspc
# Reference: https://helpcenter.veeam.com/docs/vac/deployment/silent_install_server.html?ver=9.2
- name: Checking OS for pending reboots
  pending_reboot_check:
  register: precheck
- name: Is there an existing pending reboot?
  ansible.builtin.fail:
    msg: "This Windows server requires a reboot prior to beginning the Veeam Service Provider Console Server install. After rebooting this server, you can proceed with the installation."
  when:
    - precheck.pending_reboot | bool
- name: Checking to see if Veeam Service Provider Console Server is already installed
  veeam_software_check:
    name: "Veeam Service Provider Console"
  register: software
- name: Is Veeam Service Provider Console Server already installed?
  ansible.builtin.fail:
    msg: "Veeam Service Provider Console Server is already installed on this server. Please use the upgrade task (vspc_server_upgrade) instead."
  when: software.installed | bool
- name: Is a valid service account specified?
  ansible.builtin.fail:
    msg: "A valid service_account_username and service_account_password must be specified."
  when:
    - service_account_username is not defined or service_account_username == ""
      or service_account_password is not defined or service_account_password == ""
- name: If using SQL authentication, were sql_username and sql_password specified?
  ansible.builtin.fail:
    msg: "sql_username and sql_password must be specified when using SQL authentication."
  when:
    - sql_authentication == "1"
    - sql_username is not defined or sql_password is not defined
- name: Including version-specific variables
  ansible.builtin.include_vars:
    file: "vars/vspc_v{{ version }}.yml"
- name: VSPC ISO Tasks
  ansible.builtin.include_tasks: mount_iso.yml

# Print Installation Configuration
- name: Print Installation Configuration
  ansible.builtin.debug:
    msg:
      - "ISO Drive Letter: '{{ source }}'"
      - "Installation Logs Folder: '{{ destination }}logs'"
      - "Version: {{ version }}"
      - "Download ISO?: {{ iso_download }}"
      - "ISO File Destination: {{ destination }}{{ destination_iso_file }}"
      - "License Source: {{ source_license }}"
      - "License File Destination: {{ destination }}{{ destination_license_file }}"
      - "License Auto-Update: {{ vspc_license_autoupdate }}"
      - "SQL Instance: {{ sql_instance }}"
      - "SQL Database: {{ sql_database }}"
      - "SQL Authentication Mode: {{ sql_authentication }}"
      - "VSPC Service Account: {{ service_account_username }}"
      - "VSPC Server Management Port: {{ vspc_server_management_port }}"
      - "VSPC Connection Hub Port: {{ vspc_connection_hub_port }}"
      - "VSPC Product Updates: {{ vspc_product_updates }}"
      - "VSPC Certificate Thumbprint: {{ vspc_server_certificate_thumbprint | default('not specified') }}"
      - "Install ConnectWise Manage Plugin?: {{ vspc_connectwise_plugin }}"
      - "Install File-Level Restore Plugin?: {{ vspc_flr_restore_plugin }}"

# PRE-INSTALL TASKS
- name: Create logs directory
  ansible.windows.win_file:
    path: "{{ destination }}logs"
    state: directory
- name: Copy license file
  ansible.windows.win_copy:
    src: "{{ source_license }}"
    dest: "{{ destination }}{{ destination_license_file }}"
- name: Create VSPC service account user
  ansible.windows.win_user:
    name: "{{ service_account_username }}"
    password: "{{ service_account_password }}"
    password_never_expires: true
    state: present
    groups:
      - Administrators
  when: create_service_account | bool

# INSTALLING PREREQUISITES
- name: Install Microsoft Report Viewer 2015 Runtime
  ansible.windows.win_package:
    path: "{{ source }}Redistr\\ReportViewer.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\\ReportViewer.log" /qn /norestart'
- name: Install .NET Runtime 8
  ansible.windows.win_package:
    path: "{{ source }}Redistr\\x64\\dotnet-runtime-8.0.25-win-x64.exe"
    state: present
    arguments: '/install /quiet /norestart /log "{{ destination }}logs\\dotnet-runtime.log"'
- name: Install Windows Desktop Runtime 8
  ansible.windows.win_package:
    path: "{{ source }}Redistr\\x64\\windowsdesktop-runtime-8.0.25-win-x64.exe"
    state: present
    arguments: '/install /quiet /norestart /log "{{ destination }}logs\\windowsdesktop-runtime.log"'
- name: Install ASP.NET Core Runtime 8
  ansible.windows.win_package:
    path: "{{ source }}Redistr\\x64\\aspnetcore-runtime-8.0.25-win-x64.exe"
    state: present
    arguments: '/install /quiet /norestart /log "{{ destination }}logs\\aspnetcore-runtime.log"'
- name: Install Microsoft SQL Server CLR Types
  ansible.windows.win_package:
    path: "{{ source }}Redistr\\x64\\SQLSysClrTypes.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\\SQLSysClrTypes.log" /qn /norestart'
- name: Install Microsoft OLE DB Driver for SQL Server
  ansible.windows.win_package:
    path: "{{ source }}Redistr\\x64\\msoledbsql.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\\msoledbsql.log" /qn /norestart IACCEPTMSOLEDBSQLLICENSETERMS=YES'

# INSTALLING VEEAM SERVICE PROVIDER CONSOLE SERVER
# Silent install reference: https://helpcenter.veeam.com/docs/vac/deployment/silent_install_server.html?ver=9.2
- name: Set certificate thumbprint argument if specified
  ansible.builtin.set_fact:
    vspc_cert_arg: >-
      {%- if vspc_server_certificate_thumbprint is defined and vspc_server_certificate_thumbprint != '' -%}
      VAC_SERVER_CERTIFICATE_THUMBPRINT="{{ vspc_server_certificate_thumbprint }}"{%- else -%}
      {%- endif -%}
- name: Install VSPC Server (Windows Authentication)
  ansible.windows.win_package:
    path: "{{ source }}ApplicationServer\\VAC.ApplicationServer.x64.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\VAC.ApplicationServer.x64.log" /qn ACCEPT_EULA="1" ACCEPT_LICENSING_POLICY="1" ACCEPT_THIRDPARTY_LICENSES="1" ACCEPT_REQUIRED_SOFTWARE="1" VAC_LICENSE_FILE="{{ destination }}{{ destination_license_file }}" VSPC_LICENSE_AUTOUPDATE="{{ vspc_license_autoupdate }}" VAC_SERVICE_ACCOUNT_NAME="{{ service_account_username }}" VAC_SERVICE_ACCOUNT_PASSWORD="{{ service_account_password }}" VAC_SQL_SERVER="{{ sql_instance }}" VAC_DATABASE_NAME="{{ sql_database }}" VAC_AUTHENTICATION_MODE="{{ sql_authentication }}" VAC_SERVER_MANAGEMENT_PORT="{{ vspc_server_management_port }}" VAC_CONNECTION_HUB_PORT="{{ vspc_connection_hub_port }}" VSPC_PRODUCT_UPDATES="{{ vspc_product_updates }}" {{ vspc_cert_arg }}'
  async: "{{ veeam_retries * 60 | int }}" # see main.yml for more info
  poll: 0
  register: vspc_install_win_auth
  when: sql_authentication == "0"
- name: Install VSPC Server (SQL Authentication)
  ansible.windows.win_package:
    path: "{{ source }}ApplicationServer\\VAC.ApplicationServer.x64.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\VAC.ApplicationServer.x64.log" /qn ACCEPT_EULA="1" ACCEPT_LICENSING_POLICY="1" ACCEPT_THIRDPARTY_LICENSES="1" ACCEPT_REQUIRED_SOFTWARE="1" VAC_LICENSE_FILE="{{ destination }}{{ destination_license_file }}" VSPC_LICENSE_AUTOUPDATE="{{ vspc_license_autoupdate }}" VAC_SERVICE_ACCOUNT_NAME="{{ service_account_username }}" VAC_SERVICE_ACCOUNT_PASSWORD="{{ service_account_password }}" VAC_SQL_SERVER="{{ sql_instance }}" VAC_DATABASE_NAME="{{ sql_database }}" VAC_AUTHENTICATION_MODE="{{ sql_authentication }}" VAC_SQL_USER="{{ sql_username }}" VAC_SQL_USER_PASSWORD="{{ sql_password }}" VAC_SERVER_MANAGEMENT_PORT="{{ vspc_server_management_port }}" VAC_CONNECTION_HUB_PORT="{{ vspc_connection_hub_port }}" VSPC_PRODUCT_UPDATES="{{ vspc_product_updates }}" {{ vspc_cert_arg }}'
  async: "{{ veeam_retries * 60 | int }}" # see main.yml for more info
  poll: 0
  register: vspc_install_sql_auth
  when: sql_authentication == "1"
- name: Check on VSPC Server install status
  ansible.builtin.async_status:
    jid: "{{ (vspc_install_win_auth if sql_authentication == '0' else vspc_install_sql_auth).ansible_job_id }}"
  register: async_poll_results
  until: async_poll_results.finished
  retries: "{{ veeam_retries | int }}" # see main.yml for more info
  delay: 60 # 60 retries + 60 seconds = max 1 hour wait time

# INSTALLING CONNECTWISE MANAGE PLUGIN SERVER COMPONENT (if specified)
# Silent install reference: https://helpcenter.veeam.com/docs/vac/deployment/silent_install_cwm.html?ver=9.2
- name: Install ConnectWise Manage Plugin Server Component
  ansible.windows.win_package:
    path: "{{ source }}Plugins\\ConnectWiseManage\\VAC.ConnectorService.x64.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\\VAC.ConnectorService.x64.log" /qn ACCEPT_EULA="1" ACCEPT_LICENSING_POLICY="1" ACCEPT_THIRDPARTY_LICENSES="1" ACCEPT_REQUIRED_SOFTWARE="1" USERNAME="{{ vspc_cwm_username }}" PASSWORD="{{ vspc_cwm_password }}" SERVER_ACCOUNT_NAME="{{ vspc_cwm_server_account_name }}" SERVER_ACCOUNT_PASSWORD="{{ vspc_cwm_server_account_password }}" SERVER_NAME="{{ vspc_cwm_server_name }}" VAC_SERVER_MANAGEMENT_PORT="{{ vspc_server_management_port }}"'
  when: vspc_connectwise_plugin | bool

# INSTALLING FILE-LEVEL RESTORE PLUGIN SERVER COMPONENT (if specified)
# Silent install reference: https://helpcenter.veeam.com/docs/vac/deployment/silent_install_flr.html?ver=9.2
- name: Install File-Level Restore Plugin Server Component
  ansible.windows.win_package:
    path: "{{ source }}Plugins\\FileLevelRestore\\VSPC.VeeamAgentsSelfServicePortal.x64.msi"
    state: present
    arguments: '/L*v "{{ destination }}logs\\VSPC.VeeamAgentsSelfServicePortal.x64.log" /qn ACCEPT_EULA="1" ACCEPT_LICENSING_POLICY="1" ACCEPT_THIRDPARTY_LICENSES="1" ACCEPT_REQUIRED_SOFTWARE="1" VAC_FLR_SERVICE_ACCOUNT_NAME="{{ vspc_flr_service_account_name }}" VAC_FLR_SERVICE_ACCOUNT_PASSWORD="{{ vspc_flr_service_account_password }}"'
  when: vspc_flr_restore_plugin | bool

# POST-INSTALL TASKS
- name: Unmount ISO
  community.windows.win_disk_image:
    image_path: "{{ destination }}{{ destination_iso_file }}"
    state: absent
- name: Installation Complete! Checking OS for pending reboots
  pending_reboot_check:
  register: postcheck
- name: Rebooting server if necessary
  ansible.windows.win_reboot:
    msg: Reboot initiated by Ansible to complete VSPC Server install
  when: postcheck.pending_reboot | bool
